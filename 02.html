<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site no GitHub</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px; 
            background-color: #f6f8fa; /* Um fundo leve para destacar os botões */
        }
        /* Estilo dos botões e espaçamento entre eles */
        .botao { 
            background: #24292e; 
            color: white; 
            padding: 10px 20px; 
            text-decoration: none; 
            border-radius: 5px; 
            display: inline-block;
            margin: 10px; /* Cria um espaço entre os botões */
            transition: background 0.3s;
        }
        .botao:hover {
            background: #586069; /* Efeito visual quando passa o mouse */
        }
    </style>
</head>
<body>
    <h1>Bem-vindo ao meu site!</h1>
    <p>Este é um arquivo HTML criado para o GitHub Pages.</p>
    <br>
    
    <!-- LINK 1: Currículo (Baixar localmente) -->
    <!-- O atributo 'download' força o navegador a baixar o arquivo em vez de abrir -->
    <a href=https://docs.google.com/document/d/1kLjuJuaWpBWPD3pR6FWOaBY_x1_BvMWgfVY0cyrddo4/edit?tab=t.0 download=https://docs.google.com/document/d/1kLjuJuaWpBWPD3pR6FWOaBY_x1_BvMWgfVY0cyrddo4/edit?tab=t.0 class="botao">Baixar Currículo (PDF)</a>

    <!-- LINK 2: Slide (Baixar localmente) -->
    <!-- Substitua 'seu-slide.pptx' pelo nome real do seu arquivo de slide (ex: .pptx ou .pdf) -->
    <a href=https://docs.google.com/presentation/d/165fLMbBiDYbatnflemBO8h5sABkrEzyTXaOIIWxSfwk/edit?slide=id.gc6f80d1ff_0_0#slide=id.gc6f80d1ff_0_0 download= https://docs.google.com/presentation/d/165fLMbBiDYbatnflemBO8h5sABkrEzyTXaOIIWxSfwk/edit?slide=id.gc6f80d1ff_0_0#slide=id.gc6f80d1ff_0_0 class="botao">Baixar Slide</a>

    <!-- LINK 3: Google Sites (Link Externo) -->
    <!-- Substitua o link abaixo pela URL real do seu Google Sites -->
    <a href=https://sites.google.com/d/1sAUkagOabdh7FTbv4QnZ7p0AO_zxjhMs/p/1q54R4VVTwQ2aMnqzCPfmhGJ3e-Wz-m-T/edit?pli=1 target="_blank" class="botao">Visitar meu Google Sites</a>

</body>
</html>
